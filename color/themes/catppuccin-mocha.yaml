  green: "#a6e3a1"
  yellow: "#f9e2af"
  blue: "#89b4fa"
  magenta: "#cba6f7"
  cyan: "#94e2d5"
  white: "#bac2de"
  bright_black: "#585b70"
  bright_red: "#eba0ac"
  bright_green: "#a6e3a1"
  bright_yellow: "#fab387"
  bright_blue: "#89dceb"
  bright_magenta: "#f5c2e7"
  bright_cyan: "#74c7ec"
  bright_white: "#a6adc8"

ui:
  bg: "#1e1e2e"
  bg_alt: "#181825"
  bg_dim: "#11111b"
  fg: "#cdd6f4"
  fg_alt: "#bac2de"
  fg_dim: "#7f849c"
  muted: "#6c7086"
  border: "#cdd6f4"
  border_active: "#cdd6f4"
  selection: "#45475a"
  visual: "#45475a"
  cursorline: "#313244"
  search_bg: "#f9e2af"
  search_fg: "#1e1e2e"
  inc_search_bg: "#fab387"
  inc_search_fg: "#1e1e2e"
  popup_bg: "#1e1e2e"
  popup_sel: "#313244"
  status_bg: "#181825"
  status_fg: "#cdd6f4"
  status_inactive_fg: "#6c7086"

# Keep the status and tmux bars distinct from the editor background.
# The bar surface is dark, while mode blocks use accent backgrounds.
statusline:
  normal_bg: "#cdd6f4"
  normal_fg: "#1e1e2e"
  insert_bg: "#a6e3a1"
  insert_fg: "#1e1e2e"
  visual_bg: "#cba6f7"
  visual_fg: "#1e1e2e"
  replace_bg: "#f38ba8"
  replace_fg: "#1e1e2e"
  command_bg: "#fab387"
  command_fg: "#1e1e2e"
  terminal_bg: "#94e2d5"
  terminal_fg: "#1e1e2e"
  section_bg: "#181825"
  section_fg: "#cdd6f4"
  inactive_bg: "#181825"
  inactive_fg: "#6c7086"

# Catppuccin semantic roles stay on the same palette families as the official theme.
# Blues are informational, green is success/function, peach is prompt/operator,
# mauve is for numbers and builtins, and text stays text.
semantic:
  text: "#cdd6f4"
  muted: "#6c7086"
  error: "#f38ba8"
  warning: "#f9e2af"
  info: "#89b4fa"
  hint: "#b4befe"
  success: "#a6e3a1"
  prompt: "#fab387"
  operator: "#fab387"
  type: "#f9e2af"
  function: "#a6e3a1"
  constant: "#cdd6f4"
  variable: "#cdd6f4"
  number: "#cba6f7"
  directory: "#89b4fa"
  symlink: "#94e2d5"
  executable: "#a6e3a1"
  special: "#f9e2af"
  special_char: "#f9e2af"
  module: "#89b4fa"
  title: "#fab387"
  added: "#a6e3a1"
  added_bg: "#181825"
  changed: "#89b4fa"
  changed_bg: "#181825"
  removed: "#f38ba8"
  removed_bg: "#181825"
  diff_text: "#89b4fa"
  diff_text_bg: "#313244"
  border: "#cdd6f4"
  border_active: "#cdd6f4"
  surface: "#1e1e2e"
  surface_alt: "#1e1e2e"
  selection: "#45475a"
  current_word: "#585b70"
  status_bg: "#181825"
  status_fg: "#cdd6f4"
  status_inactive_fg: "#6c7086"
  search_bg: "#f9e2af"
  search_fg: "#1e1e2e"
  inc_search_bg: "#fab387"
  inc_search_fg: "#1e1e2e"
  popup_bg: "#181825"
  popup_sel: "#313244"

# Catppuccin syntax follows the Treesitter-style palette used by catppuccin/nvim.
# Strings are teal, functions are green, keywords are red, operators are peach,
# types are yellow, and builtins/numbers stay mauve.
syntax:
  comment: "#6c7086"
  string: "#94e2d5"
  escape: "#a6e3a1"
  number: "#cba6f7"
  constant: "#cdd6f4"
  keyword: "#f38ba8"
  operator: "#fab387"
  type: "#f9e2af"
  function: "#a6e3a1"
  variable: "#cdd6f4"
  property: "#89b4fa"
  builtin: "#cba6f7"
  preproc: "#cba6f7"
  special: "#f9e2af"
  delimiter: "#9399b2"

tool:
  prompt: "#fab387"
  prompt_alt: "#f2cdcd"
  path: "#89b4fa"
  root: "#f38ba8"
  duration: "#f9e2af"
  git_clean: "#a6e3a1"
  git_dirty: "#fab387"
  git_ahead: "#74c7ec"
  git_behind: "#f38ba8"
  directory: "#89b4fa"
  executable: "#a6e3a1"
  symlink: "#94e2d5"
  archive: "#f9e2af"
  media: "#f5c2e7"
  document: "#f9e2af"
  backup: "#6c7086"

omp:
  foreground: "#cdd6f4"
  time: "#6c7086"
  user: "#89b4fa"
  host: "#74c7ec"
  root: "#f38ba8"
  git_clean: "#a6e3a1"
