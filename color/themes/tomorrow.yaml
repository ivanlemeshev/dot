  border: "#d6d6d6"
  border_active: "#4271ae"
  selection: "#d6d6d6"
  visual: "#d6d6d6"
  cursorline: "#efefef"
  search_bg: "#eab700"
  search_fg: "#4d4d4c"
  inc_search_bg: "#f5871f"
  inc_search_fg: "#4d4d4c"
  popup_bg: "#fafafa"
  popup_sel: "#efefef"
  status_bg: "#efefef"
  status_fg: "#4d4d4c"
  status_inactive_fg: "#8e908c"

# Tomorrow uses a neutral chrome surface with inverted status blocks, shared by
# both the statusline and tmux.
statusline:
  normal_bg: "#4d4d4c"
  normal_fg: "#fafafa"
  insert_bg: "#718c00"
  insert_fg: "#fafafa"
  visual_bg: "#8959a8"
  visual_fg: "#fafafa"
  replace_bg: "#c82829"
  replace_fg: "#fafafa"
  command_bg: "#f5871f"
  command_fg: "#fafafa"
  terminal_bg: "#4271ae"
  terminal_fg: "#fafafa"
  section_bg: "#efefef"
  section_fg: "#4d4d4c"
  inactive_bg: "#efefef"
  inactive_fg: "#8e908c"

# Tomorrow follows the official Vim palette families: orange for keywords and
# emphasis, blue for functions/types and navigation, green for strings/success,
# purple for structure/preproc, and red for identifiers/errors.
semantic:
  text: "#4d4d4c"
  muted: "#8e908c"
  error: "#c82829"
  warning: "#f5871f"
  info: "#4271ae"
  hint: "#3e999f"
  success: "#718c00"
  prompt: "#f5871f"
  operator: "#3e999f"
  type: "#4271ae"
  function: "#4271ae"
  constant: "#f5871f"
  variable: "#c82829"
  number: "#8959a8"
  directory: "#4271ae"
  symlink: "#3e999f"
  executable: "#718c00"
  special: "#8959a8"
  special_char: "#3e999f"
  module: "#4271ae"
  title: "#f5871f"
  added: "#718c00"
  added_bg: "#f5f5f5"
  changed: "#4271ae"
  changed_bg: "#f5f5f5"
  removed: "#c82829"
  removed_bg: "#f5f5f5"
  diff_text: "#4271ae"
  diff_text_bg: "#efefef"
  border: "#d6d6d6"
  border_active: "#4271ae"
  surface: "#efefef"
  surface_alt: "#f5f5f5"
  selection: "#d6d6d6"
  current_word: "#f5f5f5"
  status_bg: "#efefef"
  status_fg: "#4d4d4c"
  status_inactive_fg: "#8e908c"
  search_bg: "#eab700"
  search_fg: "#4d4d4c"
  inc_search_bg: "#f5871f"
  inc_search_fg: "#4d4d4c"
  popup_bg: "#fafafa"
  popup_sel: "#efefef"

# Syntax keeps the upstream Vim families intact: green strings, blue
# functions/types, orange keywords/constants, aqua operators, purple
# preprocessor/structure, and red identifiers.
syntax:
  comment: "#8e908c"
  string: "#718c00"
  escape: "#3e999f"
  number: "#8959a8"
  constant: "#f5871f"
  keyword: "#f5871f"
  operator: "#3e999f"
  type: "#4271ae"
  function: "#4271ae"
  variable: "#c82829"
  property: "#4271ae"
  builtin: "#8959a8"
  preproc: "#8959a8"
  special: "#4d4d4c"
  delimiter: "#8e908c"

tool:
  prompt: "#f5871f"
  prompt_alt: "#4271ae"
  path: "#4271ae"
  root: "#c82829"
  duration: "#eab700"
  git_clean: "#718c00"
  git_dirty: "#c82829"
  git_ahead: "#4271ae"
  git_behind: "#c82829"
  directory: "#4271ae"
  executable: "#718c00"
  symlink: "#3e999f"
  archive: "#eab700"
  media: "#3e999f"
  document: "#f5871f"
  backup: "#8e908c"

omp:
  foreground: "#4d4d4c"
  time: "#8e908c"
  user: "#4271ae"
  host: "#4271ae"
  root: "#c82829"
  git_clean: "#718c00"
  git_dirty: "#c82829"
  git_ahead: "#4271ae"
  git_behind: "#c82829"
  duration: "#eab700"
  status_ok: "#718c00"
