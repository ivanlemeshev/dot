name: "Gruvbox Material Dark Hard"

# Gruvbox Material hard dark palette. This is the source of truth for all
# generated tool colors in the dark variant.
base_palette:
  cursor: "#d4be98"
  statusline: "#32302f"
  selection: "#3c3836"
  bg: "#1d2021"
  fg: "#d4be98"
  black: #32302f
  red: #ea6962
  green: #a9b665
  # yellow is the orange in this palette.
  yellow: #d8a657
  blue: #7daea3
  magenta: #d3869b
  cyan: #89b482
  white: #d4be98
  bright_black: #928374
  bright_red: #ea6962
  bright_green: #a9b665
  bright_yellow: #d8a657
  bright_blue: #7daea3
  bright_magenta: #d3869b
  bright_cyan: #89b482
  bright_white: #d4be98

# Some special semantic colors that are used by Windows Terminal only.
windows_terminal:
  # tab_background uses the same color as the surface (bg) and should visually
  # merge with it.
  tab_background: "#1d2021"
  # tab_unfocused_background uses the same color as the statusline inactive_bg.
  tab_unfocused_background: "#32302f"

# tmux stays visually paired with the statusline using the same surface family
# and the same inverted block treatment.
tmux:
  # bar_bg matches the statusline section_bg and inactive_bg and should not
  # merge with the surface (bg).
  bar_bg: "#32302f"
  bar_fg: "#d4be98"
  block_bg: "#d4be98"
  block_fg: "#1d2021"
  alert_bg: "#ea6962"
  alert_fg: "#1d2021"
  bell_bg: "#e78a4e"
  bell_fg: "#1d2021"
  border_fg: "#928374"
  border_active_fg: "#d4be98"
  message_bg: "#32302f"
  message_fg: "#d4be98"
  mode_bg: "#32302f"
  mode_fg: "#d4be98"

