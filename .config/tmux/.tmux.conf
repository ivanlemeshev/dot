# Tmux plugin manager
# <prefix> I -> install plugins
# <prefix> U -> update plugins
# <prefix> u -> remove/uninstall plugins not on the plugin list
set -g @plugin 'tmux-plugins/tpm'

# Tmux plugins
set -g @plugin 'tmux-plugins/tmux-yank' # Copy to clipboard

# Set prefix key to Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Use <prefix> u to remove/uninstall plugins
set -g @tpm-clean 'u'

# Set a large history limit
set -g history-limit 100000

# Set mouse mode on
set -g mouse on

# Set clipboard integration
set -g set-clipboard on
# macOS
if-shell 'uname | grep -q Darwin' "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'"
if-shell 'uname | grep -q Darwin' "bind-key -T copy-mode y send-keys -X copy-pipe-and-cancel 'pbcopy'"
# Linux
if-shell 'test -n "$WSL_DISTRO_NAME"' "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'clip.exe'"
if-shell 'test -n "$WSL_DISTRO_NAME"' "bind-key -T copy-mode y send-keys -X copy-pipe-and-cancel 'clip.exe'"
if-shell 'test -z "$WSL_DISTRO_NAME" && uname | grep -q Linux' "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'"
if-shell 'test -z "$WSL_DISTRO_NAME" && uname | grep -q Linux' "bind-key -T copy-mode y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'"

# Set vi mode
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Use <prefix> a to go to the last window
bind-key a last-window

# Set the internal terminal
set -g default-terminal "tmux-256color"

# Enable true color support
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'

# Enable undercurl colours (tmux 3.0+)
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Enable undercurl colours (tmux 3.0+) WSL in Windows Terminal)
if-shell 'test -n "$WSL_DISTRO_NAME"' {
  set -as terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
}

# Makes pressing Esc pressing without delay
set -g escape-time 10

# Enable focus events for terminals that support them
set -g focus-events on

# Color palette
set -g @theme_bg "#1d1f21"
set -g @theme_fg "#c5c8c6"
set -g @theme_black "#282a2e"
set -g @theme_red "#cc6666"
set -g @theme_green "#b5bd68"
set -g @theme_yellow "#f0c674"
set -g @theme_blue "#81a2be"
set -g @theme_magenta "#b294bb"
set -g @theme_cyan "#8abeb7"
set -g @theme_surface "#373b41"
set -g @theme_bright_black "#969896"
set -g @theme_bright_white "#ffffff"
set -g @theme_on_bg "#c5c8c6"
set -g @theme_on_surface "#c5c8c6"
set -g @theme_on_red "#1d1f21"
set -g @theme_on_bright_black "#1d1f21"
set -g @theme_on_bright_white "#1d1f21"

# Set colors to status bar
set -g status-style "bg=#{@theme_surface},fg=#{@theme_on_surface}"
set -g status-position top
set -g status-justify centre

# Set window list styles
set -g window-status-style "bg=#{@theme_surface},fg=#{@theme_on_surface}"
set -g window-status-format " #I:#W#{?window_flags,:#{window_flags},} "
set -g window-status-current-style "bg=#{@theme_surface},fg=#{@theme_green},bold"
set -g window-status-current-format " #I:#W:#{window_flags} "
set -g window-status-separator ""

# Panes styling
set -g pane-border-style "fg=#{@theme_bright_black}"
set -g pane-active-border-style "fg=#{@theme_yellow}"

# Messages
set -g message-style "bg=#{@theme_surface},fg=#{@theme_on_surface}"
set -g message-command-style "bg=#{@theme_surface},fg=#{@theme_on_surface}"

# Copy mode
set-window-option -g mode-style "bg=#{@theme_bright_black},fg=#{@theme_on_bright_black}"

# Status bar left (session info)
set -g status-left "#{?client_prefix,#{#[bg=#{@theme_red},fg=#{@theme_on_red},bold] #S },#{#[bg=#{@theme_bright_white},fg=#{@theme_on_bright_white}] #S }}"

# Status bar right (time and date)
set -g status-right " #{?client_prefix,#{#[bg=#{@theme_red},fg=#{@theme_on_red}] %Y-%m-%d %H:%M },#{#[bg=#{@theme_bright_white},fg=#{@theme_on_bright_white}] %Y-%m-%d %H:%M }}"

# Initialize tmux plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
