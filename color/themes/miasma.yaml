# Miasma works best with restrained chrome: dark neutral bars separated from the
# editor background, with muted earthy mode accents.
statusline:
  normal_bg: "#78834b"
  normal_fg: "#111111"
  insert_bg: "#5f875f"
  insert_fg: "#222222"
  visual_bg: "#bb7744"
  visual_fg: "#222222"
  replace_bg: "#b36d43"
  replace_fg: "#222222"
  command_bg: "#c9a554"
  command_fg: "#222222"
  terminal_bg: "#685742"
  terminal_fg: "#d7c483"
  section_bg: "#111111"
  section_fg: "#d7c483"
  inactive_bg: "#111111"
  inactive_fg: "#666666"

# Miasma keeps most syntax close to a mossy brown/green range. This mapping
# follows the compiled highlight groups rather than forcing brighter families.
semantic:
  text: "#d7c483"
  muted: "#666666"
  error: "#b36d43"
  warning: "#685742"
  info: "#5f875f"
  hint: "#78824b"
