terminal:
  background: "#303446"
  foreground: "#c6d0f5"
  selection: "#51576d"
  tab_background: "#303446"
  tab_unfocused_background: "#303446"

# Keep statusline and tmux visually paired: one shared dark surface for every
# background, with emphasis coming from foreground colors instead.
tmux:
  bar_bg: "#292c3c"
  bar_fg: "#c6d0f5"
  block_bg: "#c6d0f5"
  block_fg: "#303446"
  alert_bg: "#e78284"
  alert_fg: "#303446"
  border_fg: "#c6d0f5"
  border_active_fg: "#c6d0f5"
  message_bg: "#292c3c"
  message_fg: "#c6d0f5"
  mode_bg: "#c6d0f5"
  mode_fg: "#303446"
  bell_bg: "#e5c890"
  bell_fg: "#303446"

