name: "Gruvbox Material Light Hard"

# Gruvbox Material hard light palette. This is the source of truth for all
# generated tool colors in the light variant.
base_palette:
  cursor: "#654735"
  statusline: "#ebdbb2"
  selection: "#f2e5bc"
  bg: "#f9f5d7"
  fg: "#654735"
  black: #654735
  red: #c14a4a
  green: #6c782e
  # yellow is the orange in this palette.
  yellow: #b47109
  blue: #45707a
  magenta: #945e80
  cyan: #4c7a5d
  white: #f2e5bc
  bright_black: #928374
  bright_red: #c14a4a
  bright_green: #6c782e
  bright_yellow: #b47109
  bright_blue: #45707a
  bright_magenta: #945e80
  bright_cyan: #4c7a5d
  bright_white: #f2e5bc

# Some special semantic colors that are used by Windows Terminal only.
windows_terminal:
  # tab_background uses the same color as the surface (bg) and should visually
  # merge with it.
  tab_background: "#f9f5d7"
  # tab_unfocused_background uses the same color as the statusline inactive_bg.
  tab_unfocused_background: "#ebdbb2"

# tmux stays visually paired with the statusline using the same surface family
# and the same inverted block treatment.
tmux:
  # bar_bg matches the statusline section_bg and inactive_bg and should not
  # merge with the surface (bg).
  bar_bg: "#ebdbb2"
  bar_fg: "#654735"
  block_bg: "#654735"
  block_fg: "#f9f5d7"
  alert_bg: "#c14a4a"
  alert_fg: "#f9f5d7"
  bell_bg: "#c35e0a"
  bell_fg: "#f9f5d7"
  border_fg: "#928374"
  border_active_fg: "#654735"
  message_bg: "#ebdbb2"
  message_fg: "#654735"
  mode_bg: "#ebdbb2"
  mode_fg: "#654735"

