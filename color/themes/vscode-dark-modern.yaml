  popup_sel: "#242526"
  status_bg: "#181818"
  status_fg: "#cccccc"
  status_inactive_fg: "#9d9d9d"

# Dark Modern keeps a quiet chrome surface and lets the blue accent carry focus.
statusline:
  normal_bg: "#0078d4"
  normal_fg: "#ffffff"
  insert_bg: "#2ea043"
  insert_fg: "#ffffff"
  visual_bg: "#c586c0"
  visual_fg: "#ffffff"
  replace_bg: "#f85149"
  replace_fg: "#ffffff"
  command_bg: "#297aa0"
  command_fg: "#ffffff"
  terminal_bg: "#4daafc"
  terminal_fg: "#121314"
  section_bg: "#181818"
  section_fg: "#cccccc"
  inactive_bg: "#181818"
  inactive_fg: "#9d9d9d"

# The semantic palette tracks Dark+/Dark Modern token colors rather than trying
# to force a separate family logic.
semantic:
  text: "#cccccc"
  muted: "#8c8c8c"
  error: "#f85149"
  warning: "#e5ba7d"
  info: "#4daafc"
  hint: "#85b6ff"
  success: "#73c991"
  prompt: "#0078d4"
  operator: "#c586c0"
  type: "#4ec9b0"
  function: "#dcdcaa"
  constant: "#569cd6"
  variable: "#9cdcfe"
  number: "#b5cea8"
  directory: "#4daafc"
  symlink: "#4ec9b0"
  executable: "#73c991"
  special: "#d7ba7d"
  special_char: "#d7ba7d"
  module: "#4daafc"
  title: "#4daafc"
  added: "#73c991"
  added_bg: "#242526"
  changed: "#e5ba7d"
  changed_bg: "#242526"
  removed: "#f85149"
  removed_bg: "#242526"
  diff_text: "#4daafc"
  diff_text_bg: "#242526"
  border: "#2b2b2b"
  border_active: "#0078d4"
  surface: "#181818"
  surface_alt: "#202020"
  selection: "#3a3d41"
  current_word: "#242526"
  status_bg: "#181818"
  status_fg: "#cccccc"
  status_inactive_fg: "#9d9d9d"
  search_bg: "#9e6a03"
  search_fg: "#ffffff"
  inc_search_bg: "#0078d4"
  inc_search_fg: "#ffffff"
  popup_bg: "#1f1f1f"
  popup_sel: "#242526"

# Dark Modern inherits the Dark+ token family through dark_plus.json.
syntax:
  comment: "#6a9955"
  string: "#ce9178"
  escape: "#d7ba7d"
  number: "#b5cea8"
  constant: "#569cd6"
  keyword: "#c586c0"
  operator: "#d4d4d4"
  type: "#4ec9b0"
  function: "#dcdcaa"
  variable: "#9cdcfe"
  property: "#9cdcfe"
  builtin: "#569cd6"
  preproc: "#569cd6"
  special: "#d7ba7d"
  delimiter: "#808080"

tool:
  prompt: "#0078d4"
  prompt_alt: "#4daafc"
  path: "#4daafc"
  root: "#f85149"
