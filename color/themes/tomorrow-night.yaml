name: "Tomorrow Night"

ansi:
  bg: "#1d1f21"
  fg: "#c5c8c6"
  black: "#000000"
  red: "#cc6666"
  green: "#b5bd68"
  yellow: "#f0c674"
  blue: "#81a2be"
  magenta: "#b294bb"
  cyan: "#8abeb7"
  white: "#ffffff"
  bright_black: "#000000"
  bright_red: "#ff3334"
  bright_green: "#9ec400"
  bright_yellow: "#f0c674"
  bright_blue: "#81a2be"
  bright_magenta: "#b777e0"
  bright_cyan: "#54ced6"
  bright_white: "#ffffff"

ui:
  bg: "#1d1f21"
  bg_alt: "#282a2e"
  bg_dim: "#303030"
  fg: "#c5c8c6"
  fg_alt: "#d0d2d1"
  fg_dim: "#969896"
  muted: "#969896"
  border: "#969896"
  border_active: "#81a2be"
  selection: "#373b41"
  visual: "#373b41"
  cursorline: "#282a2e"
  search_bg: "#f0c674"
  search_fg: "#1d1f21"
  inc_search_bg: "#de935f"
  inc_search_fg: "#1d1f21"
  popup_bg: "#1d1f21"
  popup_sel: "#373b41"
  status_bg: "#282a2e"
  status_fg: "#c5c8c6"
  status_inactive_fg: "#969896"

# Tomorrow Night uses neutral chrome with high-contrast blocks, matching the
# original Vim theme's surface and window treatment.
statusline:
  normal_bg: "#c5c8c6"
  normal_fg: "#1d1f21"
  insert_bg: "#b5bd68"
  insert_fg: "#1d1f21"
  visual_bg: "#b294bb"
  visual_fg: "#1d1f21"
  replace_bg: "#cc6666"
  replace_fg: "#1d1f21"
  command_bg: "#de935f"
  command_fg: "#1d1f21"
  terminal_bg: "#81a2be"
  terminal_fg: "#1d1f21"
  section_bg: "#282a2e"
  section_fg: "#c5c8c6"
  inactive_bg: "#282a2e"
  inactive_fg: "#969896"

# Official Tomorrow Night syntax stays on these families: orange for keywords
# and constants, green for strings, blue for functions/types, aqua for
# operators, purple for structure/preproc, and red for identifiers/errors.
semantic:
  text: "#c5c8c6"
  muted: "#969896"
  error: "#cc6666"
  warning: "#de935f"
  info: "#81a2be"
  hint: "#8abeb7"
  success: "#b5bd68"
  prompt: "#de935f"
  operator: "#8abeb7"
  type: "#81a2be"
  function: "#81a2be"
  constant: "#de935f"
  variable: "#cc6666"
  number: "#b294bb"
  directory: "#81a2be"
  symlink: "#8abeb7"
  executable: "#b5bd68"
  special: "#b294bb"
  special_char: "#8abeb7"
  module: "#81a2be"
  title: "#de935f"
  added: "#b5bd68"
  added_bg: "#303030"
  changed: "#81a2be"
  changed_bg: "#303030"
  removed: "#cc6666"
  removed_bg: "#303030"
  diff_text: "#81a2be"
  diff_text_bg: "#282a2e"
  border: "#969896"
  border_active: "#81a2be"
  surface: "#282a2e"
  surface_alt: "#303030"
  selection: "#373b41"
  current_word: "#303030"
  status_bg: "#282a2e"
  status_fg: "#c5c8c6"
  status_inactive_fg: "#969896"
  search_bg: "#f0c674"
  search_fg: "#1d1f21"
  inc_search_bg: "#de935f"
  inc_search_fg: "#1d1f21"
  popup_bg: "#1d1f21"
  popup_sel: "#373b41"

# Syntax is copied from the official Vim palette, not from terminal intuition.
syntax:
  comment: "#969896"
  string: "#b5bd68"
  escape: "#8abeb7"
  number: "#b294bb"
  constant: "#de935f"
  keyword: "#de935f"
  operator: "#8abeb7"
  type: "#81a2be"
  function: "#81a2be"
  variable: "#cc6666"
  property: "#81a2be"
  builtin: "#b294bb"
  preproc: "#b294bb"
  special: "#c5c8c6"
  delimiter: "#969896"

tool:
  prompt: "#de935f"
  prompt_alt: "#81a2be"
  path: "#81a2be"
  root: "#cc6666"
  duration: "#f0c674"
  git_clean: "#b5bd68"
  git_dirty: "#cc6666"
  git_ahead: "#81a2be"
  git_behind: "#cc6666"
  directory: "#81a2be"
  executable: "#b5bd68"
  symlink: "#8abeb7"
  archive: "#f0c674"
  media: "#8abeb7"
  document: "#de935f"
  backup: "#969896"

omp:
  foreground: "#c5c8c6"
  time: "#969896"
  user: "#81a2be"
  host: "#81a2be"
  root: "#cc6666"
  git_clean: "#b5bd68"
  git_dirty: "#cc6666"
  git_ahead: "#81a2be"
  git_behind: "#cc6666"
  duration: "#f0c674"
  status_ok: "#b5bd68"
