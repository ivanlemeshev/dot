# Ember uses one restrained bar system: neutral bar surfaces with inverted mode
# blocks, shared across statusline and tmux.
statusline:
  normal_bg: "#d8d0c0"
  normal_fg: "#1c1b19"
  insert_bg: "#8a9868"
  insert_fg: "#1c1b19"
  visual_bg: "#c8b468"
  visual_fg: "#1c1b19"
  replace_bg: "#e08060"
  replace_fg: "#1c1b19"
  command_bg: "#7890a0"
  command_fg: "#1c1b19"
  terminal_bg: "#988090"
  terminal_fg: "#1c1b19"
  section_bg: "#2e2d2a"
  section_fg: "#b0a898"
  inactive_bg: "#242320"
  inactive_fg: "#706c61"

# Semantic roles follow ember-theme/nvim: coral is the hero accent, gold covers
# warnings/types, olive covers strings/success, and steel carries information.
