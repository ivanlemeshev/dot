name: "Tomorrow Night"

# Tomorrow Night base palette. It is verified against different repos and should
# be correct. This base palette should not be changed, as it is the source of
# truth for all other color groups.
base_palette:
  cursor: "#c5c8c6"
  statusline: "#282a2e"
  selection: "#373b41"
  bg: "#1d1f21"
  fg: "#c5c8c6"
  black: #1d1f21
  red: #cc6666
  green: #b5bd68
  # yellow is the orange in this palette.
  yellow: #de935f
  blue: #81a2be
  magenta: #b294bb
  cyan: #8abeb7
  white: #c5c8c6
  bright_black: #969896
  bright_red: #cc6666
  bright_green: #b5bd68
  bright_yellow: #f0c674
  bright_blue: #81a2be
  bright_magenta: #b294bb
  bright_cyan: #8abeb7
  bright_white: #ffffff

# Some special semantic colors that are used by Windows Terminal only.
windows_terminal:
  # tab_background uses the same color as the surface (bg) and should visually
  # merge with it.
  tab_background: "#1d1f21"
  # tab_unfocused_background uses the same color as the statusline inactive_bg.
  tab_unfocused_background: "#282a2e"

# tmux stays visually paired with the statusline using the same surface family
# and the same inverted block treatment.
tmux:
  # bar_bg matches the statusline section_bg and inactive_bg and should not
  # merge with the surface (bg).
  bar_bg: "#282a2e"
  bar_fg: "#c5c8c6"
  block_bg: "#c5c8c6"
  block_fg: "#1d1f21"
  alert_bg: "#cc6666"
  alert_fg: "#1d1f21"
  bell_bg: "#de935f"
  bell_fg: "#1d1f21"
  border_fg: "#969896"
  border_active_fg: "#c5c8c6"
  message_bg: "#282a2e"
  message_fg: "#c5c8c6"
  mode_bg: "#282a2e"
  mode_fg: "#c5c8c6"

fish:
  background: "#1d1f21"
  foreground: "#c5c8c6"
  muted: "#969896"
  normal: "#c5c8c6"
  command: "#81a2be"
  keyword: "#cc6666"
  option: "#8abeb7"
  param: "#8abeb7"
  quote: "#f0c674"
  redirection: "#8abeb7"
  end: "#b5bd68"
  operator: "#8abeb7"
  escape: "#de935f"
  comment: "#969896"
  error: "#cc6666"
  autosuggestion: "#969896"
  valid_path: "#81a2be"
  cancel: "#cc6666"
  selection_background: "#373b41"
  search_match_background: "#f0c674"
  cwd: "#b5bd68"
  cwd_root: "#cc6666"
  user: "#b5bd68"
  host: "#81a2be"
  host_remote: "#de935f"
  status: "#cc6666"
  pager_progress: "#969896"
  pager_prefix: "#f0c674"
  pager_completion: "#c5c8c6"
  pager_description: "#c5c8c6"
  pager_selected_background: "#373b41"
  pager_selected_completion: "#c5c8c6"
  pager_selected_description: "#ffffff"

ls_colors:
  foreground: "#c5c8c6"
  background: "#1d1f21"
  error: "#cc6666"
  executable: "#b5bd68"
  document: "#de935f"
  directory: "#81a2be"
  special: "#b294bb"
  media: "#8abeb7"
  backup: "#969896"

fzf:
  fg: "#c5c8c6"
  bg: "#1d1f21"
  hl: "#f0c674"
  "fg+": "#ffffff"
  "bg+": "#373b41"
  "hl+": "#f0c674"
  info: "#81a2be"
  border: "#969896"
  query: "#c5c8c6"
  prompt: "#de935f"
  pointer: "#de935f"
  marker: "#81a2be"
  spinner: "#de935f"
  header: "#969896"
  label: "#c5c8c6"
  gutter: "#1d1f21"

