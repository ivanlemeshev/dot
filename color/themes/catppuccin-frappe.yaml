  red: "#e78284"
  green: "#a6d189"
  yellow: "#e5c890"
  blue: "#8caaee"
  magenta: "#ca9ee6"
  cyan: "#81c8be"
  white: "#b5bfe2"
  bright_black: "#626880"
  bright_red: "#ea999c"
  bright_green: "#a6d189"
  bright_yellow: "#ef9f76"
  bright_blue: "#99d1db"
  bright_magenta: "#f4b8e4"
  bright_cyan: "#85c1dc"
  bright_white: "#a5adce"

ui:
  bg: "#303446"
  bg_alt: "#292c3c"
  bg_dim: "#232634"
  fg: "#c6d0f5"
  fg_alt: "#b5bfe2"
  fg_dim: "#838ba7"
  muted: "#737994"
  border: "#c6d0f5"
  border_active: "#c6d0f5"
  selection: "#51576d"
  visual: "#51576d"
  cursorline: "#414559"
  search_bg: "#e5c890"
  search_fg: "#303446"
  inc_search_bg: "#ef9f76"
  inc_search_fg: "#303446"
  popup_bg: "#303446"
  popup_sel: "#414559"
  status_bg: "#292c3c"
  status_fg: "#c6d0f5"
  status_inactive_fg: "#737994"

# Keep the status and tmux bars distinct from the editor background.
# The bar surface is dark, while mode blocks use accent backgrounds.
statusline:
  normal_bg: "#c6d0f5"
  normal_fg: "#303446"
  insert_bg: "#a6d189"
  insert_fg: "#303446"
  visual_bg: "#ca9ee6"
  visual_fg: "#303446"
  replace_bg: "#e78284"
  replace_fg: "#303446"
  command_bg: "#ef9f76"
  command_fg: "#303446"
  terminal_bg: "#81c8be"
  terminal_fg: "#303446"
  section_bg: "#292c3c"
  section_fg: "#c6d0f5"
  inactive_bg: "#292c3c"
  inactive_fg: "#737994"

# Catppuccin semantic roles stay on the same palette families as the official theme.
# Blues are informational, green is success/function, peach is prompt/operator,
# mauve is for numbers and builtins, and text stays text.
semantic:
  text: "#c6d0f5"
  muted: "#737994"
  error: "#e78284"
  warning: "#e5c890"
  info: "#8caaee"
  hint: "#babbf1"
  success: "#a6d189"
  prompt: "#ef9f76"
  operator: "#ef9f76"
  type: "#e5c890"
  function: "#a6d189"
  constant: "#c6d0f5"
  variable: "#c6d0f5"
  number: "#ca9ee6"
  directory: "#8caaee"
  symlink: "#81c8be"
  executable: "#a6d189"
  special: "#e5c890"
  special_char: "#e5c890"
  module: "#8caaee"
  title: "#ef9f76"
  added: "#a6d189"
  added_bg: "#292c3c"
  changed: "#8caaee"
  changed_bg: "#292c3c"
  removed: "#e78284"
  removed_bg: "#292c3c"
  diff_text: "#8caaee"
  diff_text_bg: "#414559"
  border: "#c6d0f5"
  border_active: "#c6d0f5"
  surface: "#303446"
  surface_alt: "#303446"
  selection: "#51576d"
  current_word: "#626880"
  status_bg: "#292c3c"
  status_fg: "#c6d0f5"
  status_inactive_fg: "#737994"
  search_bg: "#e5c890"
  search_fg: "#303446"
  inc_search_bg: "#ef9f76"
  inc_search_fg: "#303446"
  popup_bg: "#292c3c"
  popup_sel: "#414559"

# Catppuccin syntax follows the Treesitter-style palette used by catppuccin/nvim.
# Strings are teal, functions are green, keywords are red, operators are peach,
# types are yellow, and builtins/numbers stay mauve.
syntax:
  comment: "#737994"
  string: "#81c8be"
  escape: "#a6d189"
  number: "#ca9ee6"
  constant: "#c6d0f5"
  keyword: "#e78284"
  operator: "#ef9f76"
  type: "#e5c890"
  function: "#a6d189"
  variable: "#c6d0f5"
  property: "#8caaee"
  builtin: "#ca9ee6"
  preproc: "#ca9ee6"
  special: "#e5c890"
  delimiter: "#949cbb"

tool:
  prompt: "#ef9f76"
  prompt_alt: "#eebebe"
  path: "#8caaee"
  root: "#e78284"
  duration: "#e5c890"
  git_clean: "#a6d189"
  git_dirty: "#ef9f76"
  git_ahead: "#85c1dc"
  git_behind: "#e78284"
  directory: "#8caaee"
  executable: "#a6d189"
  symlink: "#81c8be"
  archive: "#e5c890"
  media: "#f4b8e4"
  document: "#e5c890"
  backup: "#737994"

omp:
  foreground: "#c6d0f5"
  time: "#737994"
  user: "#8caaee"
  host: "#85c1dc"
  root: "#e78284"
  git_clean: "#a6d189"
  git_dirty: "#ef9f76"
