terminal:
  background: "#1d1f21"
  foreground: "#c5c8c6"
  selection: "#373b41"
  tab_background: "#1d1f21"
  tab_unfocused_background: "#282a2e"

# tmux stays visually paired with the statusline using the same surface family
# and the same inverted block treatment.
tmux:
  bar_bg: "#282a2e"
  bar_fg: "#c5c8c6"
  block_bg: "#c5c8c6"
  block_fg: "#1d1f21"
  alert_bg: "#cc6666"
  alert_fg: "#1d1f21"
  bell_bg: "#de935f"
  bell_fg: "#1d1f21"
  border_fg: "#969896"
  border_active_fg: "#81a2be"
  message_bg: "#282a2e"
  message_fg: "#c5c8c6"
  mode_bg: "#282a2e"
  mode_fg: "#c5c8c6"

