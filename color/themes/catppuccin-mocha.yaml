terminal:
  background: "#1e1e2e"
  foreground: "#cdd6f4"
  selection: "#45475a"
  tab_background: "#1e1e2e"
  tab_unfocused_background: "#1e1e2e"

# Keep statusline and tmux visually paired: one shared dark surface for every
# background, with emphasis coming from foreground colors instead.
tmux:
  bar_bg: "#181825"
  bar_fg: "#cdd6f4"
  block_bg: "#cdd6f4"
  block_fg: "#1e1e2e"
  alert_bg: "#f38ba8"
  alert_fg: "#1e1e2e"
  border_fg: "#cdd6f4"
  border_active_fg: "#cdd6f4"
  message_bg: "#181825"
