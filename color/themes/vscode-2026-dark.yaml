# VS Code 2026 Dark uses a layered neutral chrome with a blue focus accent.
statusline:
  normal_bg: "#3994bc"
  normal_fg: "#ffffff"
  insert_bg: "#2ea043"
  insert_fg: "#ffffff"
  visual_bg: "#c586c0"
  visual_fg: "#ffffff"
  replace_bg: "#f48771"
  replace_fg: "#121314"
  command_bg: "#297aa0"
  command_fg: "#ffffff"
  terminal_bg: "#4daafc"
  terminal_fg: "#121314"
  section_bg: "#191a1b"
  section_fg: "#bfbfbf"
  inactive_bg: "#191a1b"
  inactive_fg: "#8c8c8c"

# Semantic roles stay close to the inherited Dark+/Dark Modern token palette,
# while directory, info, and prompt roles pick up the modern blue accent.
semantic:
  text: "#bfbfbf"
  muted: "#8c8c8c"
  error: "#f48771"
  warning: "#e5ba7d"
  info: "#48a0c7"
  hint: "#53a5ca"
  success: "#73c991"
  prompt: "#3994bc"
  operator: "#c586c0"
  type: "#4ec9b0"
  function: "#dcdcaa"
  constant: "#569cd6"
  variable: "#9cdcfe"
  number: "#b5cea8"
  directory: "#48a0c7"
  symlink: "#4ec9b0"
  executable: "#73c991"
  special: "#d7ba7d"
  special_char: "#d7ba7d"
  module: "#48a0c7"
  title: "#48a0c7"
  added: "#73c991"
  added_bg: "#242526"
  changed: "#e5ba7d"
  changed_bg: "#242526"
  removed: "#f48771"
  removed_bg: "#242526"
  diff_text: "#48a0c7"
  diff_text_bg: "#242526"
  border: "#2a2b2c"
  border_active: "#3994bc"
  surface: "#191a1b"
  surface_alt: "#202122"
  selection: "#276782"
  current_word: "#242526"
  status_bg: "#191a1b"
  status_fg: "#bfbfbf"
  status_inactive_fg: "#8c8c8c"
  search_bg: "#9e6a03"
  search_fg: "#ffffff"
  inc_search_bg: "#3994bc"
  inc_search_fg: "#ffffff"
  popup_bg: "#121314"
  popup_sel: "#242526"

# 2026 Dark inherits its token palette from Dark Modern/Dark+.
syntax:
  comment: "#6a9955"
  string: "#ce9178"
  escape: "#d7ba7d"
  number: "#b5cea8"
  constant: "#569cd6"
  keyword: "#c586c0"
  operator: "#d4d4d4"
  type: "#4ec9b0"
  function: "#dcdcaa"
  variable: "#9cdcfe"
  property: "#9cdcfe"
  builtin: "#569cd6"
  preproc: "#569cd6"
  special: "#d7ba7d"
  delimiter: "#808080"

