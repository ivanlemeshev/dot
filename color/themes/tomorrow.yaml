terminal:
  background: "#fafafa"
  foreground: "#4d4d4c"
  selection: "#d6d6d6"
  tab_background: "#fafafa"
  tab_unfocused_background: "#efefef"

# tmux mirrors the statusline: neutral chrome with a dark inverted block and
# warm accent blocks for attention states.
tmux:
  bar_bg: "#efefef"
  bar_fg: "#4d4d4c"
  block_bg: "#4d4d4c"
  block_fg: "#fafafa"
  alert_bg: "#c82829"
